<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Connect Platform</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}

.container {
    background: white;
    padding: 20px;
    margin: 50px auto;
    width: 320px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

input, select {
    padding: 10px;
    margin: 8px;
    width: 90%;
}

button {
    padding: 10px;
    margin: 5px;
    width: 120px;
    cursor: pointer;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>Job Connect</h1>

<!-- Role Selection -->
<div id="roleSection">
    <h3>Select Role</h3>
    <button onclick="selectRole('worker')">Worker</button>
    <button onclick="selectRole('employer')">Employer</button>
</div>

<!-- Login/Register -->
<div id="authSection" class="hidden">
    <h3 id="roleTitle"></h3>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
</div>

<!-- Worker Dashboard -->
<div id="workerDashboard" class="hidden">
    <h2>Worker Dashboard</h2>

    <input type="text" id="workType" placeholder="Type of Work">
    <input type="text" id="location" placeholder="Location">
    <select id="workerType">
        <option value="Individual">Individual</option>
        <option value="Group">Group</option>
    </select>

    <input type="number" id="groupSize" placeholder="Group Size (if any)">
    <input type="number" id="transport" placeholder="Transport Charges">

    <button onclick="saveWorkerProfile()">Save Profile</button>

    <h3>Your Profile</h3>
    <p id="workerProfile"></p>

    <button onclick="logout()">Logout</button>
</div>

<!-- Employer Dashboard -->
<div id="employerDashboard" class="hidden">
    <h2>Employer Dashboard</h2>

    <input type="text" id="jobName" placeholder="Work Name">
    <input type="text" id="jobLocation" placeholder="Location">
    <input type="number" id="salary" placeholder="Salary / Per Day">
    <input type="number" id="workersNeeded" placeholder="Workers Needed">
    <input type="number" id="days" placeholder="Number of Days">

    <button onclick="postJob()">Post Job</button>

    <h3>Available Workers</h3>
    <p id="workerList"></p>

    <button onclick="logout()">Logout</button>
</div>

</div>

<script>
let currentUser = "";
let currentRole = "";

// Select Role
function selectRole(role) {
    currentRole = role;
    document.getElementById("authSection").classList.remove("hidden");
    document.getElementById("roleTitle").innerText = role.toUpperCase() + " LOGIN";
}

// Register
function register() {
    let name = document.getElementById("name").value;
    let password = document.getElementById("password").value;

    if (!name || !password) {
        alert("Fill all fields");
        return;
    }

    let user = {
        name,
        password,
        role: currentRole
    };

    localStorage.setItem(name, JSON.stringify(user));
    alert("Registered Successfully!");
}

// Login
function login() {
    let name = document.getElementById("name").value;
    let password = document.getElementById("password").value;

    let userData = localStorage.getItem(name);

    if (!userData) {
        alert("User not found");
        return;
    }

    let user = JSON.parse(userData);

    if (user.password === password && user.role === currentRole) {
        currentUser = name;

        document.getElementById("roleSection").classList.add("hidden");
        document.getElementById("authSection").classList.add("hidden");

        if (currentRole === "worker") {
            document.getElementById("workerDashboard").classList.remove("hidden");
            loadWorkerProfile();
        } else {
            document.getElementById("employerDashboard").classList.remove("hidden");
            showWorkers();
        }

    } else {
        alert("Invalid credentials");
    }
}

// Save Worker Profile
function saveWorkerProfile() {
    let profile = {
        workType: document.getElementById("workType").value,
        location: document.getElementById("location").value,
        type: document.getElementById("workerType").value,
        groupSize: document.getElementById("groupSize").value,
        transport: document.getElementById("transport").value
    };

    localStorage.setItem("worker_" + currentUser, JSON.stringify(profile));
    alert("Profile Saved!");
    loadWorkerProfile();
}

// Load Worker Profile
function loadWorkerProfile() {
    let data = localStorage.getItem("worker_" + currentUser);
    if (data) {
        let p = JSON.parse(data);
        document.getElementById("workerProfile").innerText =
            `Work: ${p.workType}, Location: ${p.location}, Type: ${p.type}, Group Size: ${p.groupSize}, Transport: ${p.transport}`;
    }
}

// Post Job
function postJob() {
    let job = {
        name: document.getElementById("jobName").value,
        location: document.getElementById("jobLocation").value,
        salary: document.getElementById("salary").value,
        workers: document.getElementById("workersNeeded").value,
        days: document.getElementById("days").value
    };

    localStorage.setItem("job_" + Date.now(), JSON.stringify(job));
    alert("Job Posted!");
}

// Show Workers
function showWorkers() {
    let output = "";

    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);

        if (key.startsWith("worker_")) {
            let w = JSON.parse(localStorage.getItem(key));
            output += `Work: ${w.workType}, Location: ${w.location}<br>`;
        }
    }

    document.getElementById("workerList").innerHTML = output || "No workers available";
}

// Logout
function logout() {
    location.reload();
}
</script>

</body>
</html>
