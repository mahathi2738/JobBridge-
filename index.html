<!DOCTYPE html>
<html>
<head>
  <title>WorkerConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fa;
    }

    header {
      background: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    header h2 {
      color: #ff6600;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 28px;
    }

    .hero span {
      color: #ff6600;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 80%;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .primary {
      background: #ff6600;
      color: white;
    }

    .secondary {
      background: white;
      border: 1px solid #ccc;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    video, img {
      width: 100%;
      margin-top: 10px;
      border-radius: 8px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<header>
  <h2>WorkerConnect</h2>
</header>

<!-- HOME -->
<div id="home" class="hero">
  <h1>Connect with the <span>right workers, instantly</span></h1>
  <p>Find part-time or full-time workers easily.</p>

  <button class="btn primary" onclick="showWorker()">I'm a Worker</button>
  <button class="btn secondary" onclick="showEmployer()">I'm an Employer</button>
</div>

<!-- WORKER PROFILE -->
<div id="workerPage" class="container hidden">
  <h2>Create Worker Profile</h2>

  <input id="wName" placeholder="Name">
  <input id="wSkill" placeholder="Skill (Electrician, Carpenter)">
  <input id="wPhone" placeholder="Phone Number">
  <textarea id="wDesc" placeholder="Job Description"></textarea>

  <label>Upload Video Resume</label>
  <input type="file" id="videoUpload" accept="video/*">

  <label>Upload Sample Images</label>
  <input type="file" id="imageUpload" accept="image/*" multiple>

  <button class="btn primary" onclick="saveProfile()">Save Profile</button>

  <h3>Your Profile</h3>
  <div id="profileDisplay"></div>

  <button onclick="goHome()">Back</button>
</div>

<!-- EMPLOYER PAGE -->
<div id="employerPage" class="container hidden">
  <h2>Available Workers</h2>
  <div id="workersList"></div>

  <button onclick="goHome()">Back</button>
</div>

<script>
  let workers = JSON.parse(localStorage.getItem("workers")) || [];

  function showWorker() {
    home.classList.add("hidden");
    workerPage.classList.remove("hidden");
  }

  function showEmployer() {
    home.classList.add("hidden");
    employerPage.classList.remove("hidden");
    displayWorkers();
  }

  function goHome() {
    location.reload();
  }

  function saveProfile() {
    let worker = {
      name: wName.value,
      skill: wSkill.value,
      phone: wPhone.value,
      desc: wDesc.value,
      video: "",
      images: []
    };

    // Video
    let videoFile = videoUpload.files[0];
    if (videoFile) {
      worker.video = URL.createObjectURL(videoFile);
    }

    // Images
    let imageFiles = imageUpload.files;
    for (let file of imageFiles) {
      worker.images.push(URL.createObjectURL(file));
    }

    workers.push(worker);
    localStorage.setItem("workers", JSON.stringify(workers));

    alert("Profile Saved!");
    displayProfile(worker);
  }

  function displayProfile(worker) {
    profileDisplay.innerHTML = `
      <div class="card">
        <h3>${worker.name}</h3>
        <p><b>Skill:</b> ${worker.skill}</p>
        <p><b>Description:</b> ${worker.desc}</p>
        <p><b>Phone:</b> ${worker.phone}</p>

        ${worker.video ? `<video controls src="${worker.video}"></video>` : ""}

        ${worker.images.map(img => `<img src="${img}">`).join("")}
      </div>
    `;
  }

  function displayWorkers() {
    workersList.innerHTML = "";

    workers.forEach(w => {
      workersList.innerHTML += `
        <div class="card">
          <h3>${w.name}</h3>
          <p><b>Skill:</b> ${w.skill}</p>
          <p>${w.desc}</p>
          <p><b>Contact:</b> ${w.phone}</p>

          ${w.video ? `<video controls src="${w.video}"></video>` : ""}

          ${w.images.map(img => `<img src="${img}">`).join("")}
        </div>
      `;
    });
  }
</script>

</body>
</html>
